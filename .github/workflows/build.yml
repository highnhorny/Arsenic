name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: gradle

    - name: Build with Gradle
      run: ./gradlew build --no-daemon

    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: build/libs/
